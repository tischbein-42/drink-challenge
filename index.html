<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Getränke-Challenge</title>
  <meta name="description" content="Wasser vs. Süßgetränke Challenge">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Challenge">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0f0f0;
      --muted: #888;
      --water: #3b9eff;
      --water-bg: rgba(59,158,255,0.12);
      --sweet: #ff6b35;
      --sweet-bg: rgba(255,107,53,0.12);
      --good: #4ade80;
      --good-bg: rgba(74,222,128,0.1);
      --warn: #facc15;
      --warn-bg: rgba(250,204,21,0.1);
      --bad: #f87171;
      --bad-bg: rgba(248,113,113,0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
    #app { height: 100vh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; position: relative; }

    /* Header */
    .header { padding: 52px 20px 16px; background: var(--bg); }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .app-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .app-title span { color: var(--water); }
    .date-nav { display: flex; align-items: center; gap: 8px; }
    .date-nav button { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border2); background: var(--surface); color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .date-nav button:active { background: var(--surface2); }
    .date-label { font-size: 13px; font-weight: 500; color: var(--muted); min-width: 80px; text-align: center; }

    /* Tabs */
    .tabs { display: flex; padding: 0 20px 12px; gap: 4px; }
    .tab { flex: 1; padding: 8px 0; border-radius: 10px; border: none; background: none; color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
    .tab.active { background: var(--surface2); color: var(--text); }

    /* Scroll area */
    .scroll { flex: 1; overflow-y: auto; padding: 0 20px 100px; -webkit-overflow-scrolling: touch; }
    .scroll::-webkit-scrollbar { display: none; }

    /* Player cards */
    .player-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
    .player-card.is-me { border-color: var(--water); border-width: 1.5px; }
    .pc-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; flex-shrink: 0; }
    .pc-name { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 600; flex: 1; }
    .pc-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
    .badge-good { background: var(--good-bg); color: var(--good); }
    .badge-warn { background: var(--warn-bg); color: var(--warn); }
    .badge-bad { background: var(--bad-bg); color: var(--bad); }

    .drink-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-top: 1px solid var(--border); }
    .drink-info { display: flex; align-items: center; gap: 10px; }
    .drink-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .drink-icon.water { background: var(--water-bg); }
    .drink-icon.sweet { background: var(--sweet-bg); }
    .drink-text { }
    .drink-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .drink-unit { font-size: 11px; color: var(--muted); }
    .counter { display: flex; align-items: center; gap: 10px; }
    .cnt-btn { width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; font-family: 'Inter', sans-serif; }
    .cnt-btn:active { opacity: 0.6; transform: scale(0.95); }
    .cnt-btn:disabled { opacity: 0.3; cursor: default; }
    .cnt-val { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; min-width: 28px; text-align: center; }
    .cnt-val.water { color: var(--water); }
    .cnt-val.sweet { color: var(--sweet); }

    /* Save button */
    .save-wrap { padding: 0 20px 16px; }
    .save-btn { width: 100%; padding: 14px; border-radius: 14px; border: none; background: var(--water); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'Syne', sans-serif; letter-spacing: 0.3px; transition: opacity 0.15s; }
    .save-btn:active { opacity: 0.8; }
    .save-btn:disabled { opacity: 0.4; }
    .save-msg { text-align: center; font-size: 12px; color: var(--good); margin-top: 6px; height: 16px; }

    /* Ranking */
    .section-label { font-size: 11px; font-weight: 600; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin: 20px 0 10px; }
    .lb-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 12px; }
    .lb-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .lb-row:last-child { border-bottom: none; }
    .lb-medal { font-size: 22px; min-width: 28px; }
    .lb-info { flex: 1; min-width: 0; }
    .lb-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; }
    .lb-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .lb-bar-bg { height: 3px; background: var(--surface2); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .lb-bar-fill { height: 100%; border-radius: 2px; }
    .lb-score { text-align: right; }
    .lb-pts { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
    .lb-pts-label { font-size: 11px; color: var(--muted); }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
    .stat-num { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Week */
    .week-day { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
    .week-day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .week-day-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; }
    .week-players { display: flex; flex-direction: column; gap: 6px; }
    .week-player { display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
    .week-player-name { color: var(--muted); min-width: 80px; }
    .week-player-data { display: flex; gap: 12px; }
    .week-val { display: flex; align-items: center; gap: 4px; }

    /* Setup */
    .setup-wrap { padding: 20px 0; }
    .setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 12px; }
    .setup-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .setup-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
    .setup-input-group { margin-bottom: 10px; }
    .setup-input-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .setup-input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); font-size: 15px; font-family: 'Inter', sans-serif; outline: none; }
    .setup-input:focus { border-color: var(--water); }
    .setup-btn { width: 100%; padding: 14px; border-radius: 14px; border: none; background: var(--water); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'Syne', sans-serif; margin-top: 8px; }

    /* Loading */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; gap: 12px; color: var(--muted); font-size: 14px; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border2); border-top-color: var(--water); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Bottom nav placeholder */
    .bottom-safe { height: env(safe-area-inset-bottom, 0px); background: var(--bg); }

    .hint-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; }
    .rules-tag { display: inline-block; background: var(--sweet-bg); color: var(--sweet); font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-bottom: 6px; font-weight: 500; }
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div class="app-title">💧 <span>Challenge</span></div>
      <div class="date-nav" id="dateNav" style="display:none;">
        <button id="prevDay">‹</button>
        <span class="date-label" id="dateLbl"></span>
        <button id="nextDay">›</button>
      </div>
    </div>
  </div>
  <div class="tabs" id="tabBar" style="display:none;">
    <button class="tab active" id="tab-today" onclick="switchTab('today')">Heute</button>
    <button class="tab" id="tab-ranking" onclick="switchTab('ranking')">Rangliste</button>
    <button class="tab" id="tab-week" onclick="switchTab('week')">Woche</button>
  </div>
  <div class="scroll" id="mainScroll">
    <div class="loading"><div class="spinner"></div>Lädt...</div>
  </div>
  <div id="saveArea" style="display:none;">
    <div class="save-wrap">
      <button class="save-btn" id="saveBtn" onclick="saveDay()">Speichern</button>
      <div class="save-msg" id="saveMsg"></div>
    </div>
  </div>
  <div class="bottom-safe"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBzRRmcMGFzZenX1ASRX3Sc6Zm3YQtwbao",
  authDomain: "drink-challenge-be68a.firebaseapp.com",
  projectId: "drink-challenge-be68a",
  storageBucket: "drink-challenge-be68a.firebasestorage.app",
  messagingSenderId: "989965783013",
  appId: "1:989965783013:web:0cbdd3484e60def1e4690c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── State ──────────────────────────────────────────────────────────────────
let myId = localStorage.getItem('challenge_uid');
let players = null;
let currentOffset = 0;
let currentTab = 'today';
let todayEntries = {};
let isSaving = false;

const avatars = [
  { bg: 'rgba(59,158,255,0.2)', color: '#3b9eff' },
  { bg: 'rgba(255,107,53,0.2)', color: '#ff6b35' },
  { bg: 'rgba(74,222,128,0.2)', color: '#4ade80' },
];
const medals = ['🥇','🥈','🥉'];

// ── Helpers ────────────────────────────────────────────────────────────────
function getDateKey(offset = 0) {
  const d = new Date(); d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0,10);
}
function formatDate(key) {
  const [y,m,d] = key.split('-');
  const dt = new Date(y, m-1, d);
  const days = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  return `${days[dt.getDay()]}, ${d}.${m}.`;
}
function initials(name) {
  return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}

// ── Setup screen ──────────────────────────────────────────────────────────
async function loadPlayers() {
  const snap = await getDoc(doc(db, 'config', 'players'));
  if (snap.exists()) return snap.data().list;
  return null;
}

function showSetup() {
  document.getElementById('tabBar').style.display = 'none';
  document.getElementById('dateNav').style.display = 'none';
  document.getElementById('saveArea').style.display = 'none';
  const scroll = document.getElementById('mainScroll');
  scroll.innerHTML = `
    <div class="setup-wrap">
      <div class="setup-card">
        <div class="setup-title">Challenge starten 🚀</div>
        <div class="setup-sub">Einer von euch legt die drei Namen fest — danach sind sie für alle gespeichert.</div>
        <div class="setup-input-group"><div class="setup-input-label">Bruder 1</div><input class="setup-input" id="n0" placeholder="Name eingeben" maxlength="16"></div>
        <div class="setup-input-group"><div class="setup-input-label">Bruder 2</div><input class="setup-input" id="n1" placeholder="Name eingeben" maxlength="16"></div>
        <div class="setup-input-group"><div class="setup-input-label">Bruder 3</div><input class="setup-input" id="n2" placeholder="Name eingeben" maxlength="16"></div>
        <button class="setup-btn" onclick="window._setupSave()">Los geht's →</button>
      </div>
      <div class="hint-box">
        <span class="rules-tag">Regeln</span><br>
        Max. 1× 0,5L Süßgetränk pro Tag. So wenig wie möglich, so viel Wasser wie möglich.<br><br>
        <strong>Punkte:</strong> +2 pro Wasser-Glas, −3 pro Süßgetränk
      </div>
    </div>`;

  window._setupSave = async () => {
    const names = [0,1,2].map(i => document.getElementById('n'+i).value.trim());
    if (names.some(n => !n)) { alert('Alle drei Namen ausfüllen!'); return; }
    await setDoc(doc(db, 'config', 'players'), { list: names });
    players = names;
    if (!myId) {
      myId = names[0];
      localStorage.setItem('challenge_uid', myId);
    }
    showSelectPlayer(names);
  };
}

function showSelectPlayer(names) {
  document.getElementById('tabBar').style.display = 'none';
  document.getElementById('dateNav').style.display = 'none';
  document.getElementById('saveArea').style.display = 'none';
  const scroll = document.getElementById('mainScroll');
  scroll.innerHTML = `
    <div class="setup-wrap">
      <div class="setup-card">
        <div class="setup-title">Wer bist du?</div>
        <div class="setup-sub">Wähle deinen Namen — das wird auf diesem Gerät gespeichert.</div>
        ${names.map((n,i) => `<button class="setup-btn" style="margin-top:${i===0?'8':'6'}px;background:${avatars[i].color};" onclick="window._pickPlayer(${i})">${n}</button>`).join('')}
      </div>
    </div>`;
  window._pickPlayer = (i) => {
    myId = names[i];
    localStorage.setItem('challenge_uid', myId);
    init();
  };
}

// ── Init ──────────────────────────────────────────────────────────────────
async function init() {
  players = await loadPlayers();
  if (!players) { showSetup(); return; }
  if (!myId || !players.includes(myId)) { showSelectPlayer(players); return; }
  document.getElementById('tabBar').style.display = 'flex';
  document.getElementById('dateNav').style.display = 'flex';
  updateDateLabel();
  await renderToday();
}

// ── Date nav ──────────────────────────────────────────────────────────────
function updateDateLabel() {
  document.getElementById('dateLbl').textContent = currentOffset === 0 ? 'Heute' : formatDate(getDateKey(currentOffset));
  document.getElementById('nextDay').disabled = currentOffset >= 0;
}

document.getElementById('prevDay').addEventListener('click', async () => {
  currentOffset--;
  updateDateLabel();
  if (currentTab === 'today') await renderToday();
  else if (currentTab === 'week') renderWeek();
});
document.getElementById('nextDay').addEventListener('click', async () => {
  if (currentOffset >= 0) return;
  currentOffset++;
  updateDateLabel();
  if (currentTab === 'today') await renderToday();
});

// ── Tab switch ─────────────────────────────────────────────────────────────
window.switchTab = async (tab) => {
  currentTab = tab;
  ['today','ranking','week'].forEach(t => {
    document.getElementById('tab-'+t).className = 'tab' + (t===tab?' active':'');
  });
  document.getElementById('saveArea').style.display = tab === 'today' ? '' : 'none';
  document.getElementById('dateNav').style.display = tab === 'week' ? 'none' : 'flex';
  if (tab === 'today') await renderToday();
  else if (tab === 'ranking') await renderRanking();
  else await renderWeek();
};

// ── Today ──────────────────────────────────────────────────────────────────
async function loadDayData(dateKey) {
  const snap = await getDoc(doc(db, 'days', dateKey));
  return snap.exists() ? snap.data() : {};
}

async function renderToday() {
  document.getElementById('saveArea').style.display = 'flex';
  const scroll = document.getElementById('mainScroll');
  scroll.innerHTML = '<div class="loading"><div class="spinner"></div>Lädt...</div>';
  const dateKey = getDateKey(currentOffset);
  const dayData = await loadDayData(dateKey);
  todayEntries = {};
  players.forEach((name, i) => {
    todayEntries[name] = dayData[name] || { sweet: 0, water: 0 };
  });
  renderTodayCards();
}

function getStatus(e) {
  if (e.sweet === 0) return { cls: 'badge-good', label: '✓ Clean' };
  if (e.sweet === 1) return { cls: 'badge-warn', label: '⚠ Limit' };
  return { cls: 'badge-bad', label: `✗ +${e.sweet - 1} drüber` };
}

function renderTodayCards() {
  const isToday = currentOffset === 0;
  const scroll = document.getElementById('mainScroll');
  const html = players.map((name, i) => {
    const e = todayEntries[name];
    const av = avatars[i];
    const st = getStatus(e);
    const isMe = name === myId;
    return `<div class="player-card${isMe?' is-me':''}" id="pc-${i}">
      <div class="pc-header">
        <div class="avatar" style="background:${av.bg};color:${av.color}">${initials(name)}</div>
        <div class="pc-name">${name}${isMe ? ' <span style="font-size:11px;color:var(--muted);font-weight:400;">(du)</span>' : ''}</div>
        <span class="pc-badge ${st.cls}">${st.label}</span>
      </div>
      <div class="drink-row">
        <div class="drink-info">
          <div class="drink-icon water">💧</div>
          <div class="drink-text">
            <div class="drink-name">Wasser</div>
            <div class="drink-unit">je 0,5L Glas</div>
          </div>
        </div>
        <div class="counter">
          <button class="cnt-btn" onclick="change(${i},'water',-1)" ${!isMe||!isToday?'disabled':''}>−</button>
          <span class="cnt-val water" id="water-${i}">${e.water}</span>
          <button class="cnt-btn" onclick="change(${i},'water',1)" ${!isMe||!isToday?'disabled':''}>+</button>
        </div>
      </div>
      <div class="drink-row">
        <div class="drink-info">
          <div class="drink-icon sweet">🥤</div>
          <div class="drink-text">
            <div class="drink-name">Süßgetränke</div>
            <div class="drink-unit">je 0,5L Flasche/Dose</div>
          </div>
        </div>
        <div class="counter">
          <button class="cnt-btn" onclick="change(${i},'sweet',-1)" ${!isMe||!isToday?'disabled':''}>−</button>
          <span class="cnt-val sweet" id="sweet-${i}">${e.sweet}</span>
          <button class="cnt-btn" onclick="change(${i},'sweet',1)" ${!isMe||!isToday?'disabled':''}>+</button>
        </div>
      </div>
    </div>`;
  }).join('');
  scroll.innerHTML = html;
  document.getElementById('saveBtn').disabled = !isToday;
}

window.change = (idx, type, delta) => {
  const name = players[idx];
  if (name !== myId) return;
  const e = todayEntries[name];
  e[type] = Math.max(0, e[type] + delta);
  document.getElementById(`${type}-${idx}`).textContent = e[type];
  const st = getStatus(e);
  const badge = document.querySelector(`#pc-${idx} .pc-badge`);
  badge.className = `pc-badge ${st.cls}`;
  badge.textContent = st.label;
};

window.saveDay = async () => {
  if (isSaving) return;
  isSaving = true;
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Speichert...';
  const dateKey = getDateKey(currentOffset);
  await setDoc(doc(db, 'days', dateKey), todayEntries, { merge: true });
  btn.textContent = 'Speichern';
  btn.disabled = false;
  isSaving = false;
  const msg = document.getElementById('saveMsg');
  msg.textContent = '✓ Gespeichert!';
  setTimeout(() => msg.textContent = '', 2500);
};

// ── Ranking ─────────────────────────────────────────────────────────────────
async function renderRanking() {
  const scroll = document.getElementById('mainScroll');
  scroll.innerHTML = '<div class="loading"><div class="spinner"></div>Lädt...</div>';
  const snap = await getDocs(collection(db, 'days'));
  const allDays = {};
  snap.forEach(d => allDays[d.id] = d.data());

  const totals = players.map((name,i) => {
    let sweet=0, water=0, days=0, streak=0, cur=0;
    Object.keys(allDays).sort().forEach(dk => {
      const e = allDays[dk][name];
      if (e) {
        sweet += e.sweet||0; water += e.water||0; days++;
        if ((e.sweet||0) <= 1) cur++; else { streak=Math.max(streak,cur); cur=0; }
      }
    });
    streak = Math.max(streak, cur);
    return { name, sweet, water, days, streak, score: water*2 - sweet*3, i };
  });
  totals.sort((a,b) => b.score - a.score);
  const maxScore = Math.max(...totals.map(t=>t.score), 1);

  const lbHtml = totals.map((t,rank) => {
    const av = avatars[t.i];
    const pct = Math.max(0, Math.round(Math.max(t.score,0) / maxScore * 100));
    const barColor = rank===0?'#4ade80':rank===1?'#3b9eff':'#888';
    return `<div class="lb-row">
      <div class="lb-medal">${medals[rank]||'·'}</div>
      <div class="lb-info">
        <div class="lb-name">${t.name}</div>
        <div class="lb-detail">💧${t.water} getrunken &nbsp;·&nbsp; 🥤${t.sweet} Süßgetränke &nbsp;·&nbsp; ${t.days} Tage</div>
        <div class="lb-bar-bg"><div class="lb-bar-fill" style="width:${pct}%;background:${barColor};"></div></div>
      </div>
      <div class="lb-score"><div class="lb-pts" style="color:${barColor}">${t.score}</div><div class="lb-pts-label">Pkt</div></div>
    </div>`;
  }).join('');

  const topPlayer = totals[0];
  scroll.innerHTML = `
    <div class="section-label">Gesamtrangliste</div>
    <div class="lb-card">${totals[0].days === 0 ? '<div class="empty">Noch keine Daten!<br>Heute eintragen und speichern.</div>' : lbHtml}</div>
    <div class="section-label">Längste Serie (regelkonform)</div>
    <div class="stats-grid">
      ${totals.map(t => `<div class="stat-card">
        <div class="stat-num" style="color:${avatars[t.i].color}">${t.streak}</div>
        <div class="stat-label">🔥 ${t.name}</div>
      </div>`).join('')}
    </div>
    <div class="hint-box" style="margin-top:8px;">
      <strong>Punkterechnung:</strong> +2 pro 💧 Wasser-Glas, −3 pro 🥤 Süßgetränk
    </div>`;
}

// ── Week ───────────────────────────────────────────────────────────────────
async function renderWeek() {
  const scroll = document.getElementById('mainScroll');
  scroll.innerHTML = '<div class="loading"><div class="spinner"></div>Lädt...</div>';
  const snap = await getDocs(collection(db, 'days'));
  const allDays = {};
  snap.forEach(d => allDays[d.id] = d.data());

  let html = '<div style="padding-top:4px;">';
  for (let d=6; d>=0; d--) {
    const dk = getDateKey(-d);
    const label = d===0?'Heute':formatDate(dk);
    const dayData = allDays[dk] || {};
    const hasData = players.some(n => dayData[n]);
    html += `<div class="week-day">
      <div class="week-day-header">
        <span class="week-day-name">${label}</span>
        ${hasData ? '' : '<span style="font-size:11px;color:var(--muted);">keine Daten</span>'}
      </div>
      ${hasData ? `<div class="week-players">${players.map((name,i) => {
        const e = dayData[name];
        if (!e) return `<div class="week-player"><span class="week-player-name" style="color:${avatars[i].color}">${name}</span><span style="color:var(--muted);font-size:12px;">—</span></div>`;
        const ok = (e.sweet||0) <= 1;
        return `<div class="week-player">
          <span class="week-player-name" style="color:${avatars[i].color}">${name}</span>
          <div class="week-player-data">
            <span class="week-val">💧 <strong>${e.water}</strong></span>
            <span class="week-val">🥤 <strong style="color:${ok?'var(--text)':'var(--bad)'}">${e.sweet}</strong></span>
            <span style="color:${ok?'var(--good)':'var(--bad)'};font-size:13px;">${ok?'✓':'✗'}</span>
          </div>
        </div>`;
      }).join('')}</div>` : ''}
    </div>`;
  }
  html += '</div>';
  scroll.innerHTML = html;
}

// ── Start ──────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
